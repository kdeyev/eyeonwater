name: Bug Report
description: Report an issue with the EyeOnWater integration
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the details below to help us investigate.

  - type: input
    id: ha_version
    attributes:
      label: Home Assistant Version
      placeholder: "e.g. 2025.12.0"
    validations:
      required: true

  - type: input
    id: integration_version
    attributes:
      label: Integration Version
      placeholder: "e.g. 2.6.0"
    validations:
      required: true

  - type: dropdown
    id: installation_method
    attributes:
      label: Installation Method
      options:
        - HACS
        - Manual
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Log Output
      description: |
        Paste any relevant logs from Home Assistant. You can find integration logs under
        `Settings` → `System` → `Logs` → filter for `eyeonwater`.
      render: text

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other information (screenshots, config, etc.).
